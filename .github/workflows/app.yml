name: Build PocketPal App

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android app'
        required: false
        default: 'true'
      build_ios:
        description: 'Build iOS app'
        required: false
        default: 'true'

env:
  NODE_VERSION: '22.21.0'
  JAVA_VERSION: '17'

jobs:
  setup:
    name: Setup and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript check
        run: yarn typecheck

      - name: Validate L10n
        run: yarn l10n:validate

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.build_android != 'false' || github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Android Debug APK
        run: yarn build:android
        working-directory: .

      - name: Build Android Release Bundle
        run: yarn build:android:release
        working-directory: .

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-artifacts
          path: |
            android/app/build/outputs/apk/
            android/app/build/outputs/bundle/
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: setup
    if: github.event.inputs.build_ios != 'false' || github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: 'ios'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS Debug
        run: yarn ios:build

      - name: Build iOS Release
        run: yarn ios:build:release

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-artifacts
          path: |
            ios/build/
            ios/Pods/
          retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Jest tests
        run: yarn test --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [setup, build-android, build-ios, test]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.setup.result }}" = "failure" ] || \
             [ "${{ needs.build-android.result }}" = "failure" ] || \
             [ "${{ needs.build-ios.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build succeeded"
          fi

      - name: Comment PR on success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build completed successfully!\n\n**Artifacts:**\n- Android APK/Bundle available\n- iOS build artifacts available\n- Test coverage reports available'
            })

      - name: Comment PR on failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Build failed. Please check the workflow logs for details.'
            })
